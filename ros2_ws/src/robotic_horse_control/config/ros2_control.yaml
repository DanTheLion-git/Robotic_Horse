# ros2_control.yaml
# ──────────────────
# PID gains tuned for large male red deer (~90 kg total: 60kg body + 30kg legs).
# Shorter legs (L1=0.38m, L2=0.36m) reduce required torques vs previous 0.60m legs.
# Cart removed — robot is freestanding, balance via IMU feedback in blendspace.
# 16 commanded joints: 4 legs x (hip_Z + thigh_Y + knee_Y + cannon_Y)

controller_manager:
  ros__parameters:
    update_rate: 100

leg_controller:
  ros__parameters:
    joints:
      - fl_hip_joint
      - fl_thigh_joint
      - fl_knee_joint
      - fl_cannon_joint
      - fr_hip_joint
      - fr_thigh_joint
      - fr_knee_joint
      - fr_cannon_joint
      - rl_hip_joint
      - rl_thigh_joint
      - rl_knee_joint
      - rl_cannon_joint
      - rr_hip_joint
      - rr_thigh_joint
      - rr_knee_joint
      - rr_cannon_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    gains:
      fl_hip_joint:    { p: 380.0,  i: 0.0, d:  20.0 }
      fl_thigh_joint:  { p: 700.0,  i: 0.0, d:  42.0 }
      fl_knee_joint:   { p: 1100.0, i: 0.0, d:  65.0 }
      fl_cannon_joint: { p: 550.0,  i: 0.0, d:  28.0 }
      fr_hip_joint:    { p: 380.0,  i: 0.0, d:  20.0 }
      fr_thigh_joint:  { p: 700.0,  i: 0.0, d:  42.0 }
      fr_knee_joint:   { p: 1100.0, i: 0.0, d:  65.0 }
      fr_cannon_joint: { p: 550.0,  i: 0.0, d:  28.0 }
      rl_hip_joint:    { p: 380.0,  i: 0.0, d:  20.0 }
      rl_thigh_joint:  { p: 700.0,  i: 0.0, d:  42.0 }
      rl_knee_joint:   { p: 1100.0, i: 0.0, d:  65.0 }
      rl_cannon_joint: { p: 550.0,  i: 0.0, d:  28.0 }
      rr_hip_joint:    { p: 380.0,  i: 0.0, d:  20.0 }
      rr_thigh_joint:  { p: 700.0,  i: 0.0, d:  42.0 }
      rr_knee_joint:   { p: 1100.0, i: 0.0, d:  65.0 }
      rr_cannon_joint: { p: 550.0,  i: 0.0, d:  28.0 }
