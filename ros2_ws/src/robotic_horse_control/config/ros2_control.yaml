# ros2_control.yaml
# ──────────────────
# PID gains for red deer elk (~105 kg total).
# Cart removed — robot is freestanding, balance via IMU feedback in blendspace.
# 16 commanded joints: 4 legs x (hip_Z + thigh_Y + knee_Y + cannon_Y)

controller_manager:
  ros__parameters:
    update_rate: 100

leg_controller:
  ros__parameters:
    joints:
      - fl_hip_joint
      - fl_thigh_joint
      - fl_knee_joint
      - fl_cannon_joint
      - fr_hip_joint
      - fr_thigh_joint
      - fr_knee_joint
      - fr_cannon_joint
      - rl_hip_joint
      - rl_thigh_joint
      - rl_knee_joint
      - rl_cannon_joint
      - rr_hip_joint
      - rr_thigh_joint
      - rr_knee_joint
      - rr_cannon_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    gains:
      fl_hip_joint:    { p: 450.0,  i: 0.0, d:  25.0 }
      fl_thigh_joint:  { p: 850.0,  i: 0.0, d:  50.0 }
      fl_knee_joint:   { p: 1400.0, i: 0.0, d:  80.0 }
      fl_cannon_joint: { p: 700.0,  i: 0.0, d:  35.0 }
      fr_hip_joint:    { p: 450.0,  i: 0.0, d:  25.0 }
      fr_thigh_joint:  { p: 850.0,  i: 0.0, d:  50.0 }
      fr_knee_joint:   { p: 1400.0, i: 0.0, d:  80.0 }
      fr_cannon_joint: { p: 700.0,  i: 0.0, d:  35.0 }
      rl_hip_joint:    { p: 450.0,  i: 0.0, d:  25.0 }
      rl_thigh_joint:  { p: 850.0,  i: 0.0, d:  50.0 }
      rl_knee_joint:   { p: 1400.0, i: 0.0, d:  80.0 }
      rl_cannon_joint: { p: 700.0,  i: 0.0, d:  35.0 }
      rr_hip_joint:    { p: 450.0,  i: 0.0, d:  25.0 }
      rr_thigh_joint:  { p: 850.0,  i: 0.0, d:  50.0 }
      rr_knee_joint:   { p: 1400.0, i: 0.0, d:  80.0 }
      rr_cannon_joint: { p: 700.0,  i: 0.0, d:  35.0 }
