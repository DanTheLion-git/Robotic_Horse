# ros2_control.yaml
# ──────────────────
# PID gains for Highland Cow: 107kg body, articulated spine, QDD motors.
# Very heavy body needs extremely stiff thigh+knee to hold stance.
# Horse is free-standing root; cart attached by passive rope joints.
# 17 commanded joints: spine(Z) + 4 legs x (hip_Z + thigh_Y + knee_Y + cannon_Y)

controller_manager:
  ros__parameters:
    update_rate: 100

leg_controller:
  ros__parameters:
    joints:
      - spine_yaw_joint
      - fl_hip_joint
      - fl_thigh_joint
      - fl_knee_joint
      - fl_cannon_joint
      - fr_hip_joint
      - fr_thigh_joint
      - fr_knee_joint
      - fr_cannon_joint
      - rl_hip_joint
      - rl_thigh_joint
      - rl_knee_joint
      - rl_cannon_joint
      - rr_hip_joint
      - rr_thigh_joint
      - rr_knee_joint
      - rr_cannon_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    gains:
      spine_yaw_joint: { p: 2000.0, i: 0.0, d: 120.0 }
      fl_hip_joint:    { p: 600.0,  i: 0.0, d:  40.0 }
      fl_thigh_joint:  { p: 3000.0, i: 0.0, d: 150.0 }
      fl_knee_joint:   { p: 4500.0, i: 0.0, d: 200.0 }
      fl_cannon_joint: { p: 800.0,  i: 0.0, d:  45.0 }
      fr_hip_joint:    { p: 600.0,  i: 0.0, d:  40.0 }
      fr_thigh_joint:  { p: 3000.0, i: 0.0, d: 150.0 }
      fr_knee_joint:   { p: 4500.0, i: 0.0, d: 200.0 }
      fr_cannon_joint: { p: 800.0,  i: 0.0, d:  45.0 }
      rl_hip_joint:    { p: 600.0,  i: 0.0, d:  40.0 }
      rl_thigh_joint:  { p: 3000.0, i: 0.0, d: 150.0 }
      rl_knee_joint:   { p: 4500.0, i: 0.0, d: 200.0 }
      rl_cannon_joint: { p: 800.0,  i: 0.0, d:  45.0 }
      rr_hip_joint:    { p: 600.0,  i: 0.0, d:  40.0 }
      rr_thigh_joint:  { p: 3000.0, i: 0.0, d: 150.0 }
      rr_knee_joint:   { p: 4500.0, i: 0.0, d: 200.0 }
      rr_cannon_joint: { p: 800.0,  i: 0.0, d:  45.0 }
