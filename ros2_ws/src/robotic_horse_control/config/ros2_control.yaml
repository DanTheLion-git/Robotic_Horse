# ros2_control.yaml
# ──────────────────
# PID gains for Percheron-inspired proportions: 160kg body, L1=0.28m, L2=0.26m.
# Shorter legs but much heavier body → high thigh/knee gains to hold stance.
# Horse is free-standing root; cart attached by passive rope joints.
# 16 commanded joints: 4 legs x (hip_Z + thigh_Y + knee_Y + cannon_Y)

controller_manager:
  ros__parameters:
    update_rate: 100

leg_controller:
  ros__parameters:
    joints:
      - fl_hip_joint
      - fl_thigh_joint
      - fl_knee_joint
      - fl_cannon_joint
      - fr_hip_joint
      - fr_thigh_joint
      - fr_knee_joint
      - fr_cannon_joint
      - rl_hip_joint
      - rl_thigh_joint
      - rl_knee_joint
      - rl_cannon_joint
      - rr_hip_joint
      - rr_thigh_joint
      - rr_knee_joint
      - rr_cannon_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    gains:
      fl_hip_joint:    { p: 500.0,  i: 0.0, d:  28.0 }
      fl_thigh_joint:  { p: 1200.0, i: 0.0, d:  70.0 }
      fl_knee_joint:   { p: 1800.0, i: 0.0, d: 100.0 }
      fl_cannon_joint: { p: 600.0,  i: 0.0, d:  32.0 }
      fr_hip_joint:    { p: 500.0,  i: 0.0, d:  28.0 }
      fr_thigh_joint:  { p: 1200.0, i: 0.0, d:  70.0 }
      fr_knee_joint:   { p: 1800.0, i: 0.0, d: 100.0 }
      fr_cannon_joint: { p: 600.0,  i: 0.0, d:  32.0 }
      rl_hip_joint:    { p: 500.0,  i: 0.0, d:  28.0 }
      rl_thigh_joint:  { p: 1200.0, i: 0.0, d:  70.0 }
      rl_knee_joint:   { p: 1800.0, i: 0.0, d: 100.0 }
      rl_cannon_joint: { p: 600.0,  i: 0.0, d:  32.0 }
      rr_hip_joint:    { p: 500.0,  i: 0.0, d:  28.0 }
      rr_thigh_joint:  { p: 1200.0, i: 0.0, d:  70.0 }
      rr_knee_joint:   { p: 1800.0, i: 0.0, d: 100.0 }
      rr_cannon_joint: { p: 600.0,  i: 0.0, d:  32.0 }
